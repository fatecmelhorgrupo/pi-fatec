<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro | NEXUM</title>

  <link rel="stylesheet" href="./css/estilo.css">

  <link href="https://fonts.googleapis.com/css2?family=Actor&family=Archivo+Black&display=swap" rel="stylesheet">

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">
      <img src="./img/logoazullaranja.svg" alt="Logo NEXUM">
    </div>

    <nav class="menu">
      <a href="./index.html">Início</a>
      <a href="#">Contato</a>
      <a href="#">Login</a>
    </nav>

  </header>

  <!-- CADASTRO -->

  <main class="register-page">

    <section class="register-container">

      <!-- TABS -->

      <div class="register-tabs">

        <button class="tab active">
          Empresa
        </button>

        <button class="tab">
          Universidade
        </button>

      </div>

      <!-- FORM -->

      <div class="register-content">

        <h2>
          Faça seu cadastro
        </h2>

        <form class="register-form">

          <div class="form-grid">

            <div class="input-group">
              <label>Nome da empresa</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Estado</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email">
            </div>

            <div class="input-group">
              <label>Cidade</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Telefone</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Endereço</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>CNPJ</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Área de atuação</label>
              <input type="text">
            </div>

            <div class="input-group">
              <label>Senha</label>
              <input type="password">
            </div>

            <div class="input-group">
              <label>Upload da Logo</label>
              <input type="file">
            </div>

          </div>

          <button type="submit" class="register-btn">
            Criar cadastro
          </button>

        </form>

        <p class="register-login">
          Já possui cadastro?
          <a href="#">
            Faça seu login
          </a>
        </p>

      </div>

    </section>

  </main>

</body>
</html>
